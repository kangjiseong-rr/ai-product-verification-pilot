<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 제품·서비스 확인 명세서</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --card-2: #f8fafc;
      --line: #d8dee8;
      --line-2: #c4ccd8;
      --text: #243042;
      --muted: #667085;
      --title: #111827;
      --blue: #2563eb;
      --green: #15803d;
      --orange: #ea7a1f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Inter", "Noto Sans KR", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    header {
      padding: 30px 34px;
      border: 1px solid var(--line);
      border-top: 6px solid var(--green);
      background: #ffffff;
      border-radius: 14px;
      margin-bottom: 22px;
      box-shadow: 0 10px 26px rgba(15,23,42,.06);
    }

    h1 {
      margin: 0 0 8px;
      color: var(--title);
      font-size: 28px;
      font-weight: 900;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 22px;
      box-shadow: 0 10px 26px rgba(15,23,42,.06);
    }

    .section-title {
      margin: 0 0 12px;
      color: var(--title);
      font-size: 19px;
      font-weight: 900;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .meta-item {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: var(--card-2);
      font-size: 13px;
    }

    .meta-item strong {
      display: block;
      margin-bottom: 4px;
      color: var(--title);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 10px;
    }

    th, td {
      border: 1px solid var(--line);
      padding: 10px;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      background: #eef2f7;
      color: #1e3a8a;
      text-align: center;
      font-weight: 900;
    }

    textarea, select, input[type="text"], input[type="date"] {
      width: 100%;
      min-height: 38px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--title);
      font: inherit;
    }

    textarea {
      min-height: 56px;
      resize: vertical;
    }

    .check-cell {
      text-align: center;
      vertical-align: middle;
    }

    .check-cell input {
      width: 18px;
      height: 18px;
    }

    .empty {
      color: var(--muted);
    }

    .review-zone {
      border-top: 6px solid var(--orange);
    }

    .tech-evidence-label {
      width: 12%;
      background: #f8fafc;
      color: var(--title);
      text-align: center;
      font-weight: 900;
      vertical-align: top;
    }

    .tech-evidence-value {
      background: #fcfdff;
      line-height: 1.55;
    }

    .architecture-box {
      margin-top: 14px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fafc;
    }

    .architecture-box-title {
      margin: 0 0 10px;
      color: var(--title);
      font-size: 14px;
      font-weight: 900;
    }

    .architecture-image {
      display: block;
      width: 100%;
      max-height: 480px;
      object-fit: contain;
      border: 1px solid var(--line);
      background: #fff;
    }

    .yn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-right: 8px;
      font-weight: 800;
      color: var(--title);
      white-space: nowrap;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin: 20px 0;
    }

    .final-actions {
      display: none;
      justify-content: flex-end;
      gap: 10px;
      margin: 0 0 20px;
    }

    .final-output.active .final-actions {
      display: flex;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line-2);
      border-radius: 8px;
      background: #eef2f7;
      color: var(--text);
      font-weight: 850;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .error {
      border-color: rgba(220,38,38,.35);
      background: rgba(220,38,38,.06);
      color: #991b1b;
    }

    .final-output {
      display: none;
      border-top: 6px solid var(--green);
      border-radius: 6px;
      padding: 34px 40px 42px;
    }

    .final-output.active {
      display: block;
    }

    .final-output > .section-title {
      margin-bottom: 6px;
      text-align: center;
      font-size: 24px;
      letter-spacing: 0;
    }

    .page-title {
      margin: 0 0 18px;
      font-size: 22px;
      font-weight: 900;
      color: #0047d6;
    }

    .intro {
      padding: 12px 14px;
      margin-bottom: 18px;
      border: 1px solid #b7d7ec;
      border-top: 3px solid #5fa9d8;
      background: #f8fcff;
      line-height: 1.7;
      color: #222;
      font-size: 13px;
    }

    .intro strong {
      color: #d70000;
    }

    .review-section-title {
      margin: 24px 0 6px;
      font-size: 15px;
      font-weight: 900;
      color: #111;
    }

    .review-section-title:before { content: "[ "; }
    .review-section-title:after { content: " ]"; }

    .section-desc {
      color: #666;
      margin: 4px 0 8px;
      font-size: 13px;
    }

    .form-table {
      width: 100%;
      border-collapse: collapse;
      border-top: 2px solid #5fa9d8;
      border-bottom: 2px solid #5fa9d8;
      margin-bottom: 8px;
    }

    .form-table th,
    .form-table td {
      border: 1px solid #9bc7e2;
      padding: 7px 8px;
      vertical-align: middle;
      font-size: 13px;
    }

    .form-table th {
      width: 150px;
      background: #cfe0f6;
      text-align: left;
      font-weight: 900;
      color: #111;
    }

    .form-table td {
      background: #fff;
    }

    .form-table input[type="text"],
    .form-table input[type="email"],
    .form-table input[type="tel"],
    .form-table input[type="date"],
    .form-table textarea,
    .form-table select {
      width: 100%;
      border: 1px solid #777;
      padding: 5px 6px;
      font-family: inherit;
      font-size: 13px;
      min-height: 32px;
    }

    .form-table textarea {
      min-height: 72px;
      resize: vertical;
    }

    .form-table .readonly {
      background: #f2f2f2;
      color: #555;
    }

    .required {
      color: #e00000;
      font-weight: 900;
    }

    .help {
      margin-top: 5px;
      color: #777;
      font-size: 12px;
      line-height: 1.55;
    }

    .help strong {
      color: #1d5f9f;
    }

    .inline-group {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .application-grid th {
      text-align: center;
      width: auto;
    }

    .application-grid td {
      text-align: center;
    }

    .application-grid input {
      text-align: left;
    }

    .function-table th {
      text-align: center;
      width: auto;
    }

    .function-table td {
      text-align: center;
    }

    .function-table textarea {
      min-height: 56px;
    }

    .ai-detail-card {
      border: 1px solid #9bc7e2;
      border-top: 2px solid #5fa9d8;
      background: #fbfdff;
      padding: 12px;
      margin: 8px 0 12px;
    }

    .ai-detail-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #dceafa;
      border: 1px solid #9bc7e2;
      padding: 7px 9px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .ai-detail-head .badge {
      display: inline-block;
      padding: 2px 8px;
      border: 1px solid #8ebedd;
      border-radius: 12px;
      background: #fff;
      color: #1d5f9f;
      font-size: 12px;
    }

    .ai-module-top {
      display: grid;
      grid-template-columns: 90px 1fr 210px;
      gap: 8px;
      align-items: end;
      margin-bottom: 10px;
    }

    .ai-case-panel {
      display: none;
      border: 1px dashed #8ebedd;
      background: #fff;
      padding: 10px;
      margin-top: 8px;
    }

    .ai-case-panel.active {
      display: block;
    }

    .ai-case-title {
      color: #0047d6;
      font-weight: 900;
      margin: 0 0 8px;
    }

    .admin-review-title {
      margin: 24px 0 6px;
      font-size: 15px;
      font-weight: 900;
      color: #111;
    }

    .admin-review-title:before { content: "[ "; }
    .admin-review-title:after { content: " ]"; }

    .review-summary {
      background: #edf5fb;
      border: 1px solid #c1dcec;
      padding: 9px 10px;
      color: #1d5f9f;
      line-height: 1.7;
      margin-bottom: 10px;
    }

    .admin-box {
      border: 1px solid #9bc7e2;
      border-top: 2px solid #5fa9d8;
      background: #fbfdff;
      padding: 12px;
      margin-top: 8px;
    }

    .review-checks {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
      font-weight: 900;
    }

    .review-checks label {
      white-space: nowrap;
    }

    .locked-section input,
    .locked-section textarea,
    .locked-section select {
      background: #f2f2f2 !important;
      color: #555 !important;
      cursor: not-allowed;
    }

    .locked-section .review-checks {
      color: #555;
    }

    .status-pill {
      display: inline-block;
      padding: 3px 9px;
      border: 1px solid #8ebedd;
      background: #edf5fb;
      color: #1d5f9f;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 900;
    }

    @media screen and (max-width: 960px) {
      .ai-module-top { grid-template-columns: 1fr; }
      .meta { grid-template-columns: 1fr; }
      table { table-layout: auto; }
      .actions { justify-content: stretch; flex-direction: column; }
    }

    .final-output > .lead {
      margin-bottom: 24px;
      text-align: center;
      font-size: 13px;
    }

    #finalSpecContent .card {
      padding: 20px 0 22px;
      margin: 0;
      border: 0;
      border-top: 2px solid #2f3a4a;
      border-radius: 0;
      box-shadow: none;
      break-inside: avoid;
    }

    #finalSpecContent .card:first-child {
      border-top-width: 3px;
    }

    #finalSpecContent .section-title {
      display: flex;
      align-items: center;
      min-height: 28px;
      margin: 0 0 10px;
      color: #172033;
      font-size: 16px;
      font-weight: 900;
    }

    #finalSpecContent table {
      margin-top: 0;
      border-radius: 0;
      table-layout: auto;
      border: 1px solid #9aa4b2;
    }

    #finalSpecContent th {
      padding: 8px 7px;
      background: #e8edf4;
      color: #172033;
      border-color: #a8b2c0;
      font-size: 12px;
      line-height: 1.35;
    }

    #finalSpecContent td {
      padding: 8px 7px;
      border-color: #c4ccd8;
      background: #fff;
      color: #263244;
      font-size: 12px;
      line-height: 1.45;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    #finalSpecContent .tech-evidence-label {
      background: #eef2f7;
      color: #172033;
    }

    #finalSpecContent .tech-evidence-value {
      background: #fff;
    }

    #finalSpecContent .architecture-box {
      border-radius: 0;
      background: #fff;
    }

    #finalSpecContent .meta {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    #finalSpecContent .meta-item {
      border-radius: 0;
      background: #f8fafc;
      font-size: 12px;
    }

    .final-value {
      display: inline-block;
      min-height: 24px;
      color: var(--title);
      font-weight: 600;
      white-space: pre-wrap;
    }

    .final-muted {
      color: var(--muted);
      font-weight: 600;
    }

    .final-checkbox {
      display: inline-block;
      min-width: 24px;
      color: var(--title);
      font-size: 16px;
      font-weight: 900;
      line-height: 1;
      text-align: center;
    }

    @media screen and (max-width: 960px) {
      .meta { grid-template-columns: 1fr; }
      table { table-layout: auto; }
      .actions { justify-content: stretch; flex-direction: column; }
    }

    @media print {
      @page { size: A4; margin: 12mm; }
      html, body { width: 210mm; min-width: 210mm; }
      body { background: #fff; color: #111; }
      .wrap { width: 186mm; max-width: none; min-width: 186mm; padding: 0; }
      .meta { grid-template-columns: repeat(3, minmax(0, 1fr)) !important; }
      table { table-layout: fixed !important; }
      #finalSpecOutput,
      #finalSpecContent,
      #finalSpecContent .final-review-content {
        width: 186mm !important;
        max-width: none !important;
        min-width: 186mm !important;
      }
      #finalSpecContent table {
        width: 100% !important;
        table-layout: fixed !important;
      }
      #finalSpecContent .meta {
        grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
      }
      header, .card { box-shadow: none; background: #fff; color: #111; break-inside: avoid; }
      .final-output { padding: 0; border: 0; }
      .final-output > .section-title { margin-top: 0; }
      .actions { display: none; }
      .final-actions { display: none !important; }
      textarea, select, input { border-color: #999; }
      body.final-ready header { display: none; }
      body.final-ready .wrap > #reviewContent { display: none; }
      body.final-ready #finalSpecOutput {
        display: block;
        break-inside: auto;
        page-break-inside: auto;
      }
      body.final-ready #finalSpecContent .card {
        break-inside: auto;
        page-break-inside: auto;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>AI 제품·서비스 확인 명세서</h1>
      <p class="lead">신청서 제출 데이터를 검토용 표로 변환한 화면입니다. 확인란과 검토 의견은 검토자가 작성합니다.</p>
      <div class="meta" id="submissionMeta"></div>
    </header>

    <div class="actions">
      <a class="btn" href="index.html">신청서로 돌아가기</a>
      <button type="button" class="btn btn-primary" onclick="generateFinalSpecification()">최종 명세서 출력</button>
    </div>

    <main id="reviewContent"></main>
    <section id="finalSpecOutput" class="card final-output" aria-live="polite">
      <h2 class="section-title">최종 AI 제품·서비스 확인 명세서</h2>
      <p class="lead">검토자가 작성한 확인란, 판정, 검토 의견을 반영한 최종 출력본입니다.</p>
      <div class="final-actions">
        <button type="button" class="btn" onclick="downloadFinalReviewJson()">최종 결과 JSON 저장</button>
        <button type="button" class="btn" onclick="submitFinalReviewJson()">최종 결과 JSON 전송</button>
        <button type="button" class="btn btn-primary" onclick="printFinalSpecification()">최종 명세서 인쇄 / PDF 저장</button>
      </div>
      <div id="finalSpecContent"></div>
    </section>
  </div>

  <script>
    const API_BASE_URL = localStorage.getItem('aiFormApiBaseUrl') || 'http://127.0.0.1:8010';
    let loadedApplicationData = null;

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function displayValue(value) {
      const text = String(value ?? '').trim();
      return text ? escapeHtml(text).replace(/\n/g, '<br>') : '<span class="empty">미작성</span>';
    }

    function renderMeta(data) {
      const app = data.application || {};
      const productName = app.productRows?.find(row => row.item === '제품 또는 서비스명')?.value || '';
      const companyName = app.companyRows?.find(row => row.item === '기업명')?.value || '';
      const submittedAt = data.submittedAt ? new Date(data.submittedAt).toLocaleString('ko-KR') : '';

      document.getElementById('submissionMeta').innerHTML = `
        <div class="meta-item"><strong>접수 ID</strong>${displayValue(data.id || '시연용 임시 데이터')}</div>
        <div class="meta-item"><strong>신청기업</strong>${displayValue(companyName)}</div>
        <div class="meta-item"><strong>제품/서비스</strong>${displayValue(productName)}</div>
        <div class="meta-item"><strong>생성 시각</strong>${displayValue(submittedAt)}</div>
        <div class="meta-item"><strong>상태</strong>${displayValue(data.status || 'draft')}</div>
        <div class="meta-item"><strong>스키마</strong>${displayValue(data.schemaVersion)}</div>
      `;
    }

    function findSubmittedValue(rows, item) {
      const row = (rows || []).find(entry => entry.item === item);
      return row?.value || '';
    }

    function renderFieldTable(title, rows) {
      const body = (rows || []).map(row => `
        <tr>
          <td style="text-align:center; font-weight:800;">${escapeHtml(row.no)}</td>
          <td>${escapeHtml(row.item)}</td>
          <td>${displayValue(row.value)}</td>
          <td class="check-cell"><input type="checkbox" /></td>
          <td><textarea placeholder="검토 의견"></textarea></td>
        </tr>
      `).join('');

      return `
        <section class="card">
          <h2 class="section-title">${escapeHtml(title)}</h2>
          <table>
            <thead>
              <tr>
                <th style="width:10%;">번호</th>
                <th style="width:22%;">확인 항목</th>
                <th>제출 내용</th>
                <th style="width:9%;">확인</th>
                <th style="width:24%;">검토 의견</th>
              </tr>
            </thead>
            <tbody>${body}</tbody>
          </table>
        </section>
      `;
    }

    function renderSectionReviewTable(title, rows) {
      const body = (rows || []).map(row => `
        <tr>
          <td style="text-align:center; font-weight:800;">${escapeHtml(row.no)}</td>
          <td>${escapeHtml(row.item)}</td>
          <td>${displayValue(row.value)}</td>
        </tr>
      `).join('');

      return `
        <section class="card">
          <h2 class="section-title">${escapeHtml(title)}</h2>
          <table>
            <thead>
              <tr>
                <th style="width:10%;">번호</th>
                <th style="width:24%;">확인 항목</th>
                <th>제출 내용</th>
              </tr>
            </thead>
            <tbody>
              ${body}
              <tr>
                <th colspan="2">확인</th>
                <th>검토 의견</th>
              </tr>
              <tr>
                <td colspan="2" class="check-cell"><input type="checkbox" /></td>
                <td><textarea placeholder="검토 의견"></textarea></td>
              </tr>
            </tbody>
          </table>
        </section>
      `;
    }

    function renderProductArchitecture(architecture) {
      if (!architecture?.dataUrl) return '';

      return `
        <div class="architecture-box">
          <p class="architecture-box-title">제품 구조도</p>
          <img class="architecture-image" src="${escapeHtml(architecture.dataUrl)}" alt="${escapeHtml(architecture.name || '제품 구조도')}" />
        </div>
      `;
    }

    function renderProductInfoTable(rows, architecture) {
      const rowByNo = new Map((rows || []).map(row => [String(row.no), row]));
      const normalRows = ['1.1', '1.2', '1.3', '1.3.1']
        .map(no => rowByNo.get(no))
        .filter(Boolean)
        .map(row => `
          <tr>
            <td style="text-align:center; font-weight:800;">${escapeHtml(row.no)}</td>
            <td>${escapeHtml(row.item)}</td>
            <td>${displayValue(row.value)}</td>
            <td class="check-cell"><input type="checkbox" /></td>
          </tr>
        `).join('');

      function wideRow(no) {
        const row = rowByNo.get(no);
        if (!row) return '';
        return `
          <tr>
            <td style="text-align:center; font-weight:800;">${escapeHtml(row.no)}</td>
            <td>${escapeHtml(row.item)}</td>
            <td>${displayValue(row.value)}</td>
            <td class="check-cell"><input type="checkbox" /></td>
          </tr>
        `;
      }

      return `
        <section class="card">
          <h2 class="section-title">01. 제품 정보 확인</h2>
          <table>
            <thead>
              <tr>
                <th style="width:10%;">번호</th>
                <th style="width:22%;">확인 항목</th>
                <th>제출 내용</th>

                <td><textarea readonly>보완자료 접수 후 기술심사 요청 예정입니다. 심사기관에서는 AI 기능별 구현 방식, 데이터 흐름, 모델 적용 범위, 출력 결과의 AI 연계성을 중심으로 확인해 주시기 바랍니다.</textarea></td>
              </tr>
            </table>
          </div>
        </section>
      `;
    }

    function renderAgencyReviewSection() {
      return `

          <div class="admin-box">
            <div class="review-summary">
              기술심사 접수번호 <strong>TR-2026-00001</strong> / 기술심사 요청일시 <strong>2026-06-10 14:20</strong> / 현재 처리상태 <strong>기술심사 중</strong>

                <th>기술심사 상태</th>
                <td><select><option>기술심사 접수</option><option selected>기술심사 중</option><option>보완검토 요청</option><option>심사완료</option><option>부적합 의견</option></select></td>
                <th>기술심사 담당자</th>
                <td><input type="text" value="박기술" /></td>
              </tr>
              <tr>
                <th>AI 적용 여부</th>
                <td colspan="3">
                  <div class="review-checks">
                    <label><input type="radio" name="techAiUse" checked /> 적용 확인</label>
                    <label><input type="radio" name="techAiUse" /> 추가자료 필요</label>
                    <label><input type="radio" name="techAiUse" /> 적용 확인 곤란</label>

              <tr>
                <th>기술자료 보완요청 내용</th>

2. 학습 데이터 및 추론 데이터의 출처, 유형, 전처리 방식을 보완해 주시기 바랍니다.
3. 신뢰도 점수 산출 방식과 임계값 설정 기준을 설명해 주시기 바랍니다.</textarea></td>

    function renderReview(data) {
      const app = data.application || {};
      renderMeta(data);
      document.getElementById('reviewContent').innerHTML = [
        renderApplicantSubmission(app),
        renderLockedReviewSection(app),
        renderAgencyReviewSection()
      ].join('');
    }

    function replaceControlsWithText(root) {
      root.querySelectorAll('td, .meta-item').forEach(container => {
        const radios = Array.from(container.querySelectorAll('input[type="radio"]'));
        if (!radios.length) return;

        const checked = radios.find(radio => radio.checked);
        const value = checked ? checked.value : '미선택';
        container.innerHTML = `<span class="${checked ? 'final-value' : 'final-muted'}">${escapeHtml(value)}</span>`;
      });

      root.querySelectorAll('textarea').forEach(control => {
        const value = control.value.trim();
        const span = document.createElement('span');
        span.className = value ? 'final-value' : 'final-muted';
        span.textContent = value || '미작성';
        control.replaceWith(span);
      });

      root.querySelectorAll('select').forEach(control => {
        const value = control.selectedOptions[0]?.textContent?.trim() || '';
        const span = document.createElement('span');
        span.className = value ? 'final-value' : 'final-muted';
        span.textContent = value || '미선택';
        control.replaceWith(span);
      });

      root.querySelectorAll('input[type="checkbox"]').forEach(control => {
        const span = document.createElement('span');
        span.className = 'final-checkbox';
        span.textContent = control.checked ? '☑' : '☐';
        control.replaceWith(span);
      });

      root.querySelectorAll('input[type="text"], input[type="date"]').forEach(control => {
        const value = control.value.trim();
        const span = document.createElement('span');
        span.className = value ? 'final-value' : 'final-muted';
        span.textContent = value || '미작성';
        control.replaceWith(span);
      });
    }

    function generateFinalSpecification() {
      const source = document.getElementById('reviewContent');
      if (!source.children.length) {
        alert('먼저 신청 데이터를 불러와 주세요.');
        return;
      }

      const finalContent = source.cloneNode(true);
      finalContent.removeAttribute('id');
      finalContent.classList.add('final-review-content');
      replaceControlsWithText(finalContent);

      document.getElementById('finalSpecContent').innerHTML = '';
      document.getElementById('finalSpecContent').appendChild(finalContent);

      const output = document.getElementById('finalSpecOutput');
      output.classList.add('active');
      document.body.classList.add('final-ready');
      output.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function printFinalSpecification() {
      const output = document.getElementById('finalSpecOutput');
      const finalContent = document.getElementById('finalSpecContent');
      if (!output.classList.contains('active') || !finalContent.children.length) {
        generateFinalSpecification();
      }
      document.body.classList.add('final-ready');
      setTimeout(() => window.print(), 50);
    }

    function getSectionTitleForControl(control) {
      return control.closest('section.card')?.querySelector('.section-title')?.textContent.trim() || '';
    }

    function getCellTextWithoutControls(cell) {
      const clone = cell.cloneNode(true);
      clone.querySelectorAll('input, select, textarea, button').forEach(control => control.remove());
      return clone.textContent.replace(/\s+/g, ' ').trim();
    }

    function getRowContextForControl(control) {
      const row = control.closest('tr');
      if (!row) return { rowNo: '', rowText: '' };
      const cells = Array.from(row.children).map(getCellTextWithoutControls);
      return {
        rowNo: cells[0] || '',
        rowText: cells.filter(Boolean).join(' | '),
      };
    }

    function getMetaItemLabel(control) {
      return control.closest('.meta-item')?.querySelector('strong')?.textContent.trim() || '';
    }

    function collectFinalReviewData() {
      const root = document.getElementById('reviewContent');
      const app = loadedApplicationData?.application || {};
      const applicationId = new URLSearchParams(window.location.search).get('id') || loadedApplicationData?.id || null;

      const checks = Array.from(root.querySelectorAll('input[type="checkbox"]')).map(control => {
        const context = getRowContextForControl(control);
        return {
          section: getSectionTitleForControl(control),
          rowNo: context.rowNo,
          rowText: context.rowText,
          checked: control.checked,
          marker: control.checked ? '☑' : '☐',
        };
      });

      const radioNames = Array.from(new Set(Array.from(root.querySelectorAll('input[type="radio"]')).map(control => control.name)));
      const radioResults = radioNames.map(name => {
        const controls = Array.from(root.querySelectorAll(`input[type="radio"][name="${CSS.escape(name)}"]`));
        const checked = controls.find(control => control.checked);
        const context = getRowContextForControl(controls[0]);
        return {
          section: getSectionTitleForControl(controls[0]),
          rowNo: context.rowNo,
          rowText: context.rowText,
          value: checked?.value || '',
        };
      });

      const selectValues = Array.from(root.querySelectorAll('select')).map(control => {
        const context = getRowContextForControl(control);
        return {
          section: getSectionTitleForControl(control),
          label: getMetaItemLabel(control),
          rowNo: context.rowNo,
          rowText: context.rowText,
          value: control.selectedOptions[0]?.textContent.trim() || '',
        };
      });

      const textValues = Array.from(root.querySelectorAll('textarea, input[type="text"], input[type="date"]')).map(control => {
        const context = getRowContextForControl(control);
        return {
          section: getSectionTitleForControl(control),
          label: getMetaItemLabel(control),
          rowNo: context.rowNo,
          rowText: context.rowText,
          type: control.type || control.tagName.toLowerCase(),
          value: control.value.trim(),
        };
      });

      const decision = {
        finalDecision: selectValues.find(item => item.label === '최종 판정')?.value || '',
        reviewer: textValues.find(item => item.label === '검토자')?.value || '',
        reviewedAt: textValues.find(item => item.label === '검토일')?.value || '',
      };

      return {
        schemaVersion: 'ai-product-final-review.v1',
        applicationId,
        submittedAt: new Date().toISOString(),
        status: 'final-review',
        applicationSummary: {
          companyName: findSubmittedValue(app.companyRows, '기업명'),
          productName: findSubmittedValue(app.productRows, '제품 또는 서비스명'),
          productVersion: findSubmittedValue(app.productRows, '제품 버전'),
        },
        sourceApplication: loadedApplicationData,
        finalReview: {
          decision,
          checks,
          radioResults,
          selectValues,
          textValues,
        },
      };
    }

    function ensureFinalSpecificationGenerated() {
      const output = document.getElementById('finalSpecOutput');
      const finalContent = document.getElementById('finalSpecContent');
      if (!output.classList.contains('active') || !finalContent.children.length) {
        generateFinalSpecification();
      }
    }

    function downloadFinalReviewJson() {
      ensureFinalSpecificationGenerated();
      const data = collectFinalReviewData();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'ai-product-final-review.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function submitFinalReviewJson() {
      ensureFinalSpecificationGenerated();
      const data = collectFinalReviewData();
      try {
        const response = await fetch(API_BASE_URL + '/api/final-results', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        if (!response.ok) throw new Error('API 제출 실패');
        const result = await response.json();
        alert('최종 결과 JSON을 전송했습니다. 접수 ID: ' + result.id);
      } catch (error) {
        alert('최종 결과 JSON 전송에 실패했습니다. 로컬 시연 서버 실행 상태를 확인하거나 JSON 저장 버튼을 사용하세요.');
      }
    }

    async function loadApplication() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (id) {
        try {
          const response = await fetch(API_BASE_URL + '/api/applications/' + encodeURIComponent(id));
          if (!response.ok) throw new Error('not found');
          loadedApplicationData = await response.json();
          renderReview(loadedApplicationData);
          return;
        } catch (error) {
          document.getElementById('reviewContent').innerHTML = '<section class="card error">제출 데이터를 불러오지 못했습니다. 시연 서버 실행 상태와 API 주소를 확인하세요.</section>';
          return;
        }
      }

      const stored = sessionStorage.getItem('aiApplicationDraft');
      if (!stored) {
        document.getElementById('reviewContent').innerHTML = '<section class="card error">표시할 신청 데이터가 없습니다. 신청서 작성 화면에서 다시 제출해 주세요.</section>';
        return;
      }

      loadedApplicationData = JSON.parse(stored);
      renderReview(loadedApplicationData);
    }

    loadApplication();
  </script>
