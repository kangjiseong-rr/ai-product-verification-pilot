<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 제품 서비스 확인 명세서</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --card-2: #f8fafc;
      --line: #d8dee8;
      --line-2: #c4ccd8;
      --text: #243042;
      --muted: #667085;
      --title: #111827;
      --blue: #2563eb;
      --green: #15803d;
      --orange: #ea7a1f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Inter", "Noto Sans KR", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    header {
      padding: 30px 34px;
      border: 1px solid var(--line);
      border-top: 6px solid var(--green);
      background: #ffffff;
      border-radius: 14px;
      margin-bottom: 22px;
      box-shadow: 0 10px 26px rgba(15,23,42,.06);
    }

    h1 {
      margin: 0 0 8px;
      color: var(--title);
      font-size: 28px;
      font-weight: 900;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 22px;
      box-shadow: 0 10px 26px rgba(15,23,42,.06);
    }

    .section-title {
      margin: 0 0 12px;
      color: var(--title);
      font-size: 19px;
      font-weight: 900;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .meta-item {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: var(--card-2);
      font-size: 13px;
    }

    .meta-item strong {
      display: block;
      margin-bottom: 4px;
      color: var(--title);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 10px;
    }

    th, td {
      border: 1px solid var(--line);
      padding: 10px;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      background: #eef2f7;
      color: #1e3a8a;
      text-align: center;
      font-weight: 900;
    }

    textarea, select, input[type="text"], input[type="date"] {
      width: 100%;
      min-height: 38px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--title);
      font: inherit;
    }

    textarea {
      min-height: 56px;
      resize: vertical;
    }

    .check-cell {
      text-align: center;
      vertical-align: middle;
    }

    .check-cell input {
      width: 18px;
      height: 18px;
    }

    .empty {
      color: var(--muted);
    }

    .review-zone {
      border-top: 6px solid var(--orange);
    }

    .tech-evidence-label {
      width: 12%;
      background: #f8fafc;
      color: var(--title);
      text-align: center;
      font-weight: 900;
      vertical-align: top;
    }

    .tech-evidence-value {
      background: #fcfdff;
      line-height: 1.55;
    }

    .architecture-box {
      margin-top: 14px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fafc;
    }

    .architecture-box-title {
      margin: 0 0 10px;
      color: var(--title);
      font-size: 14px;
      font-weight: 900;
    }

    .architecture-image {
      display: block;
      width: 100%;
      max-height: 480px;
      object-fit: contain;
      border: 1px solid var(--line);
      background: #fff;
    }

    .yn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-right: 8px;
      font-weight: 800;
      color: var(--title);
      white-space: nowrap;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin: 20px 0;
    }

    .final-actions {
      display: none;
      justify-content: flex-end;
      gap: 10px;
      margin: 0 0 20px;
    }

    .final-output.active .final-actions {
      display: flex;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line-2);
      border-radius: 8px;
      background: #eef2f7;
      color: var(--text);
      font-weight: 850;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .error {
      border-color: rgba(220,38,38,.35);
      background: rgba(220,38,38,.06);
      color: #991b1b;
    }

    .final-output {
      display: none;
      border-top: 6px solid var(--green);
      border-radius: 6px;
      padding: 34px 40px 42px;
    }

    .final-output.active {
      display: block;
    }

    .final-output > .section-title {
      margin-bottom: 6px;
      text-align: center;
      font-size: 24px;
      letter-spacing: 0;
    }

    .final-output > .lead {
      margin-bottom: 24px;
      text-align: center;
      font-size: 13px;
    }

    #finalSpecContent .card {
      padding: 20px 0 22px;
      margin: 0;
      border: 0;
      border-top: 2px solid #2f3a4a;
      border-radius: 0;
      box-shadow: none;
      break-inside: avoid;
    }

    #finalSpecContent .card:first-child {
      border-top-width: 3px;
    }

    #finalSpecContent .section-title {
      display: flex;
      align-items: center;
      min-height: 28px;
      margin: 0 0 10px;
      color: #172033;
      font-size: 16px;
      font-weight: 900;
    }

    #finalSpecContent table {
      margin-top: 0;
      border-radius: 0;
      table-layout: auto;
      border: 1px solid #9aa4b2;
    }

    #finalSpecContent th {
      padding: 8px 7px;
      background: #e8edf4;
      color: #172033;
      border-color: #a8b2c0;
      font-size: 12px;
      line-height: 1.35;
    }

    #finalSpecContent td {
      padding: 8px 7px;
      border-color: #c4ccd8;
      background: #fff;
      color: #263244;
      font-size: 12px;
      line-height: 1.45;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    #finalSpecContent .tech-evidence-label {
      background: #eef2f7;
      color: #172033;
    }

    #finalSpecContent .tech-evidence-value {
      background: #fff;
    }

    #finalSpecContent .architecture-box {
      border-radius: 0;
      background: #fff;
    }

    #finalSpecContent .meta {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    #finalSpecContent .meta-item {
      border-radius: 0;
      background: #f8fafc;
      font-size: 12px;
    }

    .final-value {
      display: inline-block;
      min-height: 24px;
      color: var(--title);
      font-weight: 600;
      white-space: pre-wrap;
    }

    .final-muted {
      color: var(--muted);
      font-weight: 600;
    }

    @media (max-width: 960px) {
      .meta { grid-template-columns: 1fr; }
      table { table-layout: auto; }
      .actions { justify-content: stretch; flex-direction: column; }
    }

    @media print {
      body { background: #fff; color: #111; }
      .wrap { max-width: none; padding: 0; }
      header, .card { box-shadow: none; background: #fff; color: #111; break-inside: avoid; }
      .final-output { padding: 0; border: 0; }
      .final-output > .section-title { margin-top: 0; }
      .actions { display: none; }
      .final-actions { display: none !important; }
      textarea, select, input { border-color: #999; }
      body.final-ready header { display: none; }
      body.final-ready .wrap > #reviewContent { display: none; }
      body.final-ready #finalSpecOutput {
        display: block;
        break-inside: auto;
        page-break-inside: auto;
      }
      body.final-ready #finalSpecContent .card {
        break-inside: auto;
        page-break-inside: auto;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>AI 제품 서비스 확인 명세서</h1>
      <p class="lead">신청서 제출 데이터를 검토용 표로 변환한 화면입니다. 확인란과 검토 의견은 검토자가 작성합니다.</p>
      <div class="meta" id="submissionMeta"></div>
    </header>

    <div class="actions">
      <a class="btn" href="index.html">신청서로 돌아가기</a>
      <button type="button" class="btn btn-primary" onclick="generateFinalSpecification()">최종 명세서 출력</button>
      <button type="button" class="btn" onclick="window.print()">검토 화면 인쇄</button>
    </div>

    <main id="reviewContent"></main>
    <section id="finalSpecOutput" class="card final-output" aria-live="polite">
      <h2 class="section-title">최종 AI 제품 서비스 확인 명세서</h2>
      <p class="lead">검토자가 작성한 확인란, 판정, 검토 의견을 반영한 최종 출력본입니다.</p>
      <div class="final-actions">
        <button type="button" class="btn btn-primary" onclick="printFinalSpecification()">최종 명세서 인쇄 / PDF 저장</button>
      </div>
      <div id="finalSpecContent"></div>
    </section>
  </div>

  <script>
    const API_BASE_URL = localStorage.getItem('aiFormApiBaseUrl') || 'http://127.0.0.1:8010';

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function displayValue(value) {
      const text = String(value ?? '').trim();
      return text ? escapeHtml(text).replace(/\n/g, '<br>') : '<span class="empty">미작성</span>';
    }

    function renderMeta(data) {
      const app = data.application || {};
      const productName = app.productRows?.find(row => row.item === '제품 또는 서비스명')?.value || '';
      const companyName = app.companyRows?.find(row => row.item === '기업명')?.value || '';
      const submittedAt = data.submittedAt ? new Date(data.submittedAt).toLocaleString('ko-KR') : '';

      document.getElementById('submissionMeta').innerHTML = `
        <div class="meta-item"><strong>접수 ID</strong>${displayValue(data.id || '시연용 임시 데이터')}</div>
        <div class="meta-item"><strong>신청기업</strong>${displayValue(companyName)}</div>
        <div class="meta-item"><strong>제품/서비스</strong>${displayValue(productName)}</div>
        <div class="meta-item"><strong>생성 시각</strong>${displayValue(submittedAt)}</div>
        <div class="meta-item"><strong>상태</strong>${displayValue(data.status || 'draft')}</div>
        <div class="meta-item"><strong>스키마</strong>${displayValue(data.schemaVersion)}</div>
      `;
    }

    function renderFieldTable(title, rows) {
      const body = (rows || []).map(row => `
        <tr>
          <td style="text-align:center; font-weight:800;">${escapeHtml(row.no)}</td>
          <td>${escapeHtml(row.item)}</td>
          <td>${displayValue(row.value)}</td>
          <td class="check-cell"><input type="checkbox" /></td>
          <td><textarea placeholder="검토 의견"></textarea></td>
        </tr>
      `).join('');

      return `
        <section class="card">
          <h2 class="section-title">${escapeHtml(title)}</h2>
          <table>
            <thead>
              <tr>
                <th style="width:10%;">번호</th>
                <th style="width:22%;">확인 항목</th>
                <th>제출 내용</th>
                <th style="width:9%;">확인</th>
                <th style="width:24%;">검토 의견</th>
              </tr>
            </thead>
            <tbody>${body}</tbody>
          </table>
        </section>
      `;
    }

    function renderProductArchitecture(architecture) {
      if (!architecture?.dataUrl) return '';

      return `
        <div class="architecture-box">
          <p class="architecture-box-title">제품 구조도</p>
          <img class="architecture-image" src="${escapeHtml(architecture.dataUrl)}" alt="${escapeHtml(architecture.name || '제품 구조도')}" />
        </div>
      `;
    }

    function renderProductInfoTable(rows) {
      const rowByNo = new Map((rows || []).map(row => [String(row.no), row]));
      const normalRows = ['1.1', '1.2', '1.3', '1.3.1']
        .map(no => rowByNo.get(no))
        .filter(Boolean)
        .map(row => `
          <tr>
            <td style="text-align:center; font-weight:800;">${escapeHtml(row.no)}</td>
            <td>${escapeHtml(row.item)}</td>
            <td>${displayValue(row.value)}</td>
            <td class="check-cell"><input type="checkbox" /></td>
            <td><textarea placeholder="검토 의견"></textarea></td>
          </tr>
        `).join('');

      function wideRow(no) {
        const row = rowByNo.get(no);
        if (!row) return '';
        return `
          <tr>
            <td style="text-align:center; font-weight:800;">${escapeHtml(row.no)}</td>
            <td>${escapeHtml(row.item)}</td>
            <td colspan="3">${displayValue(row.value)}</td>
          </tr>
          <tr>
            <td></td>
            <td style="text-align:center; font-weight:800;">확인 / 검토 의견</td>
            <td colspan="3">
              <label class="yn"><input type="checkbox"> 확인</label>
              <textarea placeholder="검토 의견" style="margin-top:8px;"></textarea>
            </td>
          </tr>
        `;
      }

      return `
        <section class="card">
          <h2 class="section-title">01. 제품 정보 확인</h2>
          <table>
            <thead>
              <tr>
                <th style="width:10%;">번호</th>
                <th style="width:22%;">확인 항목</th>
                <th>제출 내용</th>
                <th style="width:9%;">확인</th>
                <th style="width:24%;">검토 의견</th>
              </tr>
            </thead>
            <tbody>
              ${normalRows}
              ${wideRow('1.4')}
              ${wideRow('1.4.1')}
              ${wideRow('1.4.2')}
              ${wideRow('1.5')}
              ${wideRow('1.6')}
            </tbody>
          </table>
        </section>
      `;
    }

    function renderProductInfoSection(app) {
      return renderProductInfoTable(app.productRows) +
        (app.productArchitecture ? `
          <section class="card">
            <h2 class="section-title">01-1. 제품 구조도 확인</h2>
            ${renderProductArchitecture(app.productArchitecture)}
          </section>
        ` : '');
    }

    function renderFeatureTable(features) {
      const body = (features || []).map(feature => `
        <tr>
          <td style="text-align:center; font-weight:800;">${displayValue(feature.no)}</td>
          <td>${displayValue(feature.name)}</td>
          <td>${displayValue(feature.role)}</td>
          <td>${displayValue(feature.input)}</td>
          <td>${displayValue(feature.output)}</td>
          <td>${displayValue(feature.manual)}</td>
          <td class="check-cell"><input type="checkbox" /></td>
          <td><textarea placeholder="검토 의견"></textarea></td>
        </tr>
      `).join('');

      return `
        <section class="card">
          <h2 class="section-title">04. AI 기능 목록 확인</h2>
          <table>
            <thead>
              <tr>
                <th style="width:7%;">번호</th>
                <th style="width:16%;">AI 기능명</th>
                <th>AI 역할</th>
                <th>사용자 입력</th>
                <th>프로그램 출력</th>
                <th style="width:13%;">매뉴얼 위치</th>
                <th style="width:7%;">확인</th>
                <th style="width:18%;">검토 의견</th>
              </tr>
            </thead>
            <tbody>${body}</tbody>
          </table>
        </section>
      `;
    }

    function renderTechDetailTable(rows) {
      const body = (rows || []).map(row => `
        <tr>
          <td style="text-align:center; font-weight:800;">${displayValue(row.no)}</td>
          <td>${displayValue(row.name)}</td>
          <td>${displayValue(row.method)}</td>
          <td>${displayValue(row.files)}</td>
          <td class="check-cell"><input type="checkbox" /></td>
          <td><textarea placeholder="검토 의견"></textarea></td>
        </tr>
        <tr class="tech-evidence-row">
          <td class="tech-evidence-label">구현 근거</td>
          <td class="tech-evidence-value" colspan="5">${displayValue(row.details)}</td>
        </tr>
      `).join('');

      return `
        <section class="card">
          <h2 class="section-title">05. 기능별 AI 구현 상세 확인</h2>
          <table>
            <thead>
              <tr>
                <th style="width:7%;">기능 번호</th>
                <th style="width:22%;">기능명</th>
                <th style="width:22%;">AI 구현 방식</th>
                <th style="width:16%;">첨부자료</th>
                <th style="width:7%;">확인</th>
                <th style="width:26%;">검토 의견</th>
              </tr>
            </thead>
            <tbody>${body}</tbody>
          </table>
        </section>
      `;
    }

    function renderInternalReviewChecklist() {
      return `
        <section class="card review-zone">
          <h2 class="section-title">07. 최종 확인 체크리스트</h2>
          <table>
            <thead>
              <tr>
                <th style="width:14%;">구분</th>
                <th style="width:7%;">번호</th>
                <th style="width:18%;">점검 항목</th>
                <th>확인 내용</th>
                <th style="width:10%;">결과</th>
                <th style="width:10%;">확인 방법</th>
                <th style="width:18%;">비고 / 검토 의견</th>
              </tr>
            </thead>
            <tbody>
              ${renderChecklistRow('인공지능 모델 확인', '1.1', '인공지능 적용', '머신러닝, 딥러닝, LLM 등 인공지능 모델이 적용되어 있는가?', true)}
              ${renderChecklistRow('', '1.2', '학습/추론 특성 존재', '모델에 학습 또는 추론 등 인공지능 특성이 존재하는가?')}
              ${renderChecklistRow('', '1.3', '추론 결과 확인', '입력 데이터가 모델을 거쳐 유의미한 결과를 내는가?')}
              ${renderChecklistRow('인공지능 기능 확인', '2.1', '구조', '아키텍처 설계도 상 인공지능 모델의 위치와 제품 내부 로직 결합 구조가 확인되는가?', true)}
              ${renderChecklistRow('', '2.2', '결과 반영', 'AI 처리 결과가 최종 화면, 보고서, 추천, 분류 등 제품 결과에 반영되는가?')}
              ${renderChecklistRow('', '2.3', '추적 가능성', '사용자 입력부터 AI 처리, 최종 출력까지 추적 가능한가?')}
              ${renderChecklistRow('외부 모델 연동 확인', '3.1', 'API 연동', '외부 모델 연동 시 입/출력 예시 또는 연계 근거가 확인되는가?', true)}
            </tbody>
          </table>
          <div class="meta" style="margin-top:16px;">
            <div class="meta-item"><strong>최종 판정</strong><select><option>AI 제품 서비스 확인 완료</option><option>보완 후 재검토 필요</option><option>AI 제품 서비스 확인 불가</option></select></div>
            <div class="meta-item"><strong>검토자</strong><input type="text" /></div>
            <div class="meta-item"><strong>검토일</strong><input type="date" /></div>
          </div>
        </section>
      `;
    }

    function renderChecklistRow(group, no, item, content, showGroup) {
      const groupCell = showGroup ? `<td style="text-align:center; vertical-align:middle; font-weight:900;">${escapeHtml(group)}</td>` : '<td></td>';
      return `
        <tr>
          ${groupCell}
          <td style="text-align:center; font-weight:800;">${escapeHtml(no)}</td>
          <td style="text-align:center; font-weight:800;">${escapeHtml(item)}</td>
          <td>${escapeHtml(content)}</td>
          <td>
            <label class="yn"><input type="radio" name="r${escapeHtml(no)}" value="Y"> Y</label>
            <label class="yn"><input type="radio" name="r${escapeHtml(no)}" value="N"> N</label>
          </td>
          <td><select><option>서류</option><option>현장</option><option>서류/현장</option></select></td>
          <td><textarea placeholder="검토 의견"></textarea></td>
        </tr>
      `;
    }

    function renderReview(data) {
      const app = data.application || {};
      renderMeta(data);
      document.getElementById('reviewContent').innerHTML = [
        renderProductInfoSection(app),
        renderFieldTable('02. 신청기업 정보 확인', app.companyRows),
        renderFieldTable('03. AI 제품 분류 확인', app.categoryRows),
        renderFeatureTable(app.features),
        renderTechDetailTable(app.techDetails),
        renderFieldTable('06. 기존 인증 및 시험 결과 확인', app.certRows),
        renderInternalReviewChecklist()
      ].join('');
    }

    function replaceControlsWithText(root) {
      root.querySelectorAll('td, .meta-item').forEach(container => {
        const radios = Array.from(container.querySelectorAll('input[type="radio"]'));
        if (!radios.length) return;

        const checked = radios.find(radio => radio.checked);
        const value = checked ? checked.value : '미선택';
        container.innerHTML = `<span class="${checked ? 'final-value' : 'final-muted'}">${escapeHtml(value)}</span>`;
      });

      root.querySelectorAll('textarea').forEach(control => {
        const value = control.value.trim();
        const span = document.createElement('span');
        span.className = value ? 'final-value' : 'final-muted';
        span.textContent = value || '미작성';
        control.replaceWith(span);
      });

      root.querySelectorAll('select').forEach(control => {
        const value = control.selectedOptions[0]?.textContent?.trim() || '';
        const span = document.createElement('span');
        span.className = value ? 'final-value' : 'final-muted';
        span.textContent = value || '미선택';
        control.replaceWith(span);
      });

      root.querySelectorAll('input[type="checkbox"]').forEach(control => {
        const span = document.createElement('span');
        span.className = control.checked ? 'final-value' : 'final-muted';
        span.textContent = control.checked ? '확인' : '미확인';
        control.replaceWith(span);
      });

      root.querySelectorAll('input[type="text"], input[type="date"]').forEach(control => {
        const value = control.value.trim();
        const span = document.createElement('span');
        span.className = value ? 'final-value' : 'final-muted';
        span.textContent = value || '미작성';
        control.replaceWith(span);
      });
    }

    function generateFinalSpecification() {
      const source = document.getElementById('reviewContent');
      if (!source.children.length) {
        alert('먼저 신청 데이터를 불러와 주세요.');
        return;
      }

      const finalContent = source.cloneNode(true);
      finalContent.removeAttribute('id');
      finalContent.classList.add('final-review-content');
      replaceControlsWithText(finalContent);

      document.getElementById('finalSpecContent').innerHTML = '';
      document.getElementById('finalSpecContent').appendChild(finalContent);

      const output = document.getElementById('finalSpecOutput');
      output.classList.add('active');
      document.body.classList.add('final-ready');
      output.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function printFinalSpecification() {
      const output = document.getElementById('finalSpecOutput');
      const finalContent = document.getElementById('finalSpecContent');
      if (!output.classList.contains('active') || !finalContent.children.length) {
        generateFinalSpecification();
      }
      document.body.classList.add('final-ready');
      setTimeout(() => window.print(), 50);
    }

    async function loadApplication() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (id) {
        try {
          const response = await fetch(API_BASE_URL + '/api/applications/' + encodeURIComponent(id));
          if (!response.ok) throw new Error('not found');
          renderReview(await response.json());
          return;
        } catch (error) {
          document.getElementById('reviewContent').innerHTML = '<section class="card error">제출 데이터를 불러오지 못했습니다. 시연 서버 실행 상태와 API 주소를 확인하세요.</section>';
          return;
        }
      }

      const stored = sessionStorage.getItem('aiApplicationDraft');
      if (!stored) {
        document.getElementById('reviewContent').innerHTML = '<section class="card error">표시할 신청 데이터가 없습니다. 신청서 작성 화면에서 다시 제출해 주세요.</section>';
        return;
      }

      renderReview(JSON.parse(stored));
    }

    loadApplication();
  </script>
</body>
</html>
